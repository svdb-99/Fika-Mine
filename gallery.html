<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Mine's Kitchen</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --cream-bg: #fdfaf5;
            --parchment: #f6f1eb;
            --maroon: #4a0404;
            --text-brown: #3d2b1f;
            --gold-accent: #b58d67;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--cream-bg);
            color: var(--text-brown);
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: var(--cream-bg);
        }

        .logo {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .logo a {
            text-decoration: none;
            color: var(--text-brown);
        }

        .back-link {
            color: var(--maroon);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--gold-accent);
        }

        .gallery-page {
            background: var(--maroon);
            padding: 60px 8% 80px;
            text-align: center;
            color: white;
        }

        .gallery-page h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .gallery-page .subtitle {
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .gallery-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 4px;
            transition: var(--transition);
        }

        .gallery-grid img:hover {
            transform: scale(1.05);
            z-index: 2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        footer {
            background: var(--maroon);
            color: white;
            text-align: center;
            padding: 30px 8%;
            font-size: 0.75rem;
            opacity: 0.6;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .gallery-page h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
